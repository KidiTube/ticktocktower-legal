<!DOCTYPE html>
<html lang="en">
<head>

  <title>TickTockTower — Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; }

    .doc-link { display: flex; align-items: center; gap: 14px; background: #0f172a; border: 1px solid #334155; border-radius: 14px; padding: 18px 20px; text-decoration: none; color: #fff; margin-bottom: 14px; transition: border-color 0.2s; }
    .doc-link:hover { border-color: #3b82f6; }
    .doc-icon { font-size: 24px; }
    .doc-info { text-align: left; }
    .doc-title { font-size: 16px; font-weight: 600; color: #fff; }
    .doc-desc { font-size: 13px; color: #64748b; margin-top: 2px; }
    .arrow { margin-left: auto; color: #3b82f6; font-size: 18px; }
    .footer { margin-top: 36px; font-size: 12px; color: #475569; line-height: 1.8; }
    .footer a { color: #3b82f6; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">

    <a class="doc-link" href="privacy-policy.html">

      </div>
